# !! DO NOT COMMIT REAL CREDENTIALS !!
#
# This file uses placeholder values. Before deploying, create the secret with:
#
#   kubectl create secret generic app-secrets \
#     --namespace app \
#     --from-literal=POSTGRES_USER=<your-user> \
#     --from-literal=POSTGRES_PASSWORD=<your-password> \
#     --from-literal=POSTGRES_DB=techsalarydb \
#     --from-literal=DATABASE_URL="postgresql+psycopg2://<user>:<password>@postgres.data.svc.cluster.local:5432/techsalarydb" \
#     --from-literal=JWT_SECRET=<a-long-random-secret>
#
#   kubectl create secret generic postgres-secret \
#     --namespace data \
#     --from-literal=POSTGRES_USER=<your-user> \
#     --from-literal=POSTGRES_PASSWORD=<your-password> \
#     --from-literal=POSTGRES_DB=techsalarydb
#
# For Azure production: use Azure Key Vault with the Secrets Store CSI driver.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: app
type: Opaque
stringData:
  POSTGRES_USER: <CHANGE_ME>
  POSTGRES_PASSWORD: <CHANGE_ME>
  POSTGRES_DB: techsalarydb
  DATABASE_URL: "postgresql+psycopg2://<CHANGE_ME>:<CHANGE_ME>@postgres.data.svc.cluster.local:5432/techsalarydb"
  JWT_SECRET: <CHANGE_ME>
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: data
type: Opaque
stringData:
  POSTGRES_USER: <CHANGE_ME>
  POSTGRES_PASSWORD: <CHANGE_ME>
  POSTGRES_DB: techsalarydb

apiVersion: apps/v1
kind: Deployment
metadata:
  name: salary-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: salary-service
  template:
    metadata:
      labels:
        app: salary-service
    spec:
      containers:
        - name: salary-service
          image: <ACR_LOGINSERVER>/salary-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: salary-service
  namespace: app
spec:
  selector:
    app: salary-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: stats-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stats-service
  template:
    metadata:
      labels:
        app: stats-service
    spec:
      containers:
        - name: stats-service
          image: <ACR_LOGINSERVER>/stats-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: stats-service
  namespace: app
spec:
  selector:
    app: stats-service
  ports:
    - port: 8005
      targetPort: 8005
  type: ClusterIP

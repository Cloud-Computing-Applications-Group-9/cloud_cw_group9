version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: dev-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techsalarydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql:ro

  salary_service:
    build: ./backend/salary_service
    container_name: salary_service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=techsalarydb
    depends_on:
      - postgres

  # Add other backend services.

volumes:
  postgres_data:
